name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check + fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Check
        run: cargo check --all-features

  build:
    name: cargo build (release) + smoke test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml') }}

      - name: Build release
        run: cargo build --release

      - name: Smoke test — gateway health + pillar 503
        run: |
          ./target/release/tkawen-api &
          SERVER_PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:9099/v1/health | grep -q '"status":"ok"'
          curl -sS -o /dev/null -w "%{http_code}\n" -X POST http://127.0.0.1:9099/v1/connect/rooms | grep -q "503"
          kill $SERVER_PID
